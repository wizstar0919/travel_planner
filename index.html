<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>여행 플래너</title>
<!--
  여행 플래너 MVP1 (v1.1)
  - 단일 HTML, PC·모바일 반응형
  - 저장: localStorage (기본) + 구글 드라이브 동기화(배포 시 로그인)
  - AI 추천·자동편성: Gemini/Groq API (BYOK, 설정에서 키 입력)
  참고 문서: 여행플래너_기획서/요구사항정의서/화면설계/셋업가이드 (모두 v1)
  v1.1 수정: 자동편성 날짜 타임존 버그, 드라이브 동기화 충돌(updatedAt 병합),
            도시필터 리셋, 추천 오류안내, 장소 느슨매칭, 접근성(줌 허용) 등 13건
-->
<style>
  :root{
    --accent:#4f46e5;          /* 포인트 컬러 1개 */
    --accent-soft:#eef2ff;
    --accent-line:#c7d2fe;
    --bg:#f7f7f8;
    --surface:#ffffff;
    --line:#ececf0;
    --ink:#18181b;
    --ink-2:#52525b;
    --ink-3:#a1a1aa;
    --ok:#16a34a;
    --warn:#f59e0b;
    --radius:16px;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.05);
    --maxw:720px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
  a{color:var(--accent);text-decoration:none}

  .app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg)}

  /* 상단 바 */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(247,247,248,.85);backdrop-filter:saturate(180%) blur(12px);
    display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .topbar h1{font-size:19px;font-weight:700;margin:0;letter-spacing:-.02em;flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px;color:var(--ink-2)}
  .iconbtn:hover{background:var(--line)}
  .iconbtn.primary{background:var(--accent);color:#fff}
  .iconbtn.primary:hover{filter:brightness(.94)}

  .content{padding:16px}
  .muted{color:var(--ink-3)}
  .sub{color:var(--ink-2);font-size:13px}

  /* 카드 */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}

  /* 여행 카드 */
  .trip-card{padding:18px;position:relative;overflow:hidden}
  .trip-card:hover{border-color:var(--accent-line)}
  .trip-card .name{font-size:17px;font-weight:700;letter-spacing:-.01em;margin:0 0 6px}
  .trip-card .period{color:var(--ink-2);font-size:14px}
  .trip-card .dday{margin-top:12px;display:inline-block;font-weight:700;color:var(--accent);
    background:var(--accent-soft);padding:4px 10px;border-radius:20px;font-size:13px}
  .trip-card .del{position:absolute;top:10px;right:10px;opacity:0;font-size:16px;color:var(--ink-3);
    width:30px;height:30px;border-radius:8px}
  .trip-card:hover .del{opacity:1}
  .trip-card .del:hover{background:#fee2e2;color:#dc2626}

  /* 빈 상태 */
  .empty{text-align:center;padding:64px 20px;color:var(--ink-3)}
  .empty .big{font-size:44px;margin-bottom:12px}

  /* 폼 */
  .field{margin-bottom:18px}
  .field > label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:7px}
  .field .hint{font-weight:400;color:var(--ink-3);margin-left:4px}
  .input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);outline:none}
  .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea.input{resize:vertical;min-height:64px}
  .row{display:flex;gap:8px;align-items:center}
  .row .input{flex:1}

  .city-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .city-row .input{min-width:0}
  .city-row .cname{flex:1.3}
  .city-row .cdate{flex:1}
  .xbtn{width:34px;height:34px;border-radius:10px;color:var(--ink-3);font-size:18px;flex:none}
  .xbtn:hover{background:#fee2e2;color:#dc2626}
  .addlink{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:600;font-size:14px;padding:8px 2px}

  .seg{display:flex;gap:6px;background:var(--line);padding:4px;border-radius:12px}
  .seg button{flex:1;padding:9px;border-radius:9px;font-size:14px;font-weight:600;color:var(--ink-2)}
  .seg button.on{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}

  .btn{display:block;width:100%;padding:15px;border-radius:13px;background:var(--accent);color:#fff;
    font-weight:700;font-size:16px;text-align:center}
  .btn:hover{filter:brightness(.94)}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--line);filter:none}
  .btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
  .btn.sm{padding:11px;font-size:14px;border-radius:11px}

  /* 여행 상세 헤더 */
  .trip-head{padding:4px 0 14px}
  .trip-head .meta{color:var(--ink-2);font-size:14px;margin-top:4px}
  .trip-head .dday{color:var(--accent);font-weight:700}

  /* 탭바 */
  .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:5px;
    position:sticky;top:63px;z-index:15}
  .tabs button{flex:1;padding:10px 4px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--ink-2);
    display:flex;flex-direction:column;align-items:center;gap:2px}
  .tabs button .ic{font-size:17px}
  .tabs button.on{background:var(--accent-soft);color:var(--accent)}

  .tabpane{margin-top:16px}
  .sectiontitle{font-size:15px;font-weight:700;margin:2px 0 12px;display:flex;align-items:center;gap:8px}

  /* 칩 */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:8px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--line);
    font-size:13.5px;font-weight:600;color:var(--ink-2);white-space:nowrap}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* 장소 카드 */
  .place{padding:18px 18px;margin-bottom:14px;display:flex;gap:16px;align-items:flex-start}
  .place .thumb{width:130px;height:130px;border-radius:14px;flex:none;overflow:hidden;background:var(--accent-soft);
    display:grid;place-items:center;font-size:52px}
  .place .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  @media(min-width:560px){.place .thumb{width:170px;height:170px}}
  .place .body{flex:1;min-width:0}
  .place .pname{font-weight:700;font-size:19px;letter-spacing:-.01em}
  .place .pmeta{font-size:14px;color:var(--ink-2);margin-top:5px}
  .place .pdesc{font-size:15px;color:var(--ink-2);margin-top:8px;line-height:1.55}
  .place .ptip{font-size:13.5px;color:var(--warn);margin-top:8px}
  .place .plinks{margin-top:10px;font-size:14px}

  .badge{flex:none;padding:8px 14px;border-radius:20px;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid transparent}
  .badge.add{background:var(--surface);color:var(--ink-2);border-color:var(--line)}
  .badge.add:hover{border-color:var(--accent);color:var(--accent)}
  .badge.cand{background:var(--surface);color:var(--accent);border-color:var(--accent-line)}
  .badge.sched{background:var(--accent);color:#fff}

  .lvl{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:700;margin-left:2px}
  .lvl.저{background:#dcfce7;color:#166534}
  .lvl.중{background:#fef9c3;color:#854d0e}
  .lvl.고{background:#fee2e2;color:#991b1b}

  /* 추천 카드 2열(세로형: 사진 위 + 글씨 아래) */
  .place-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(min-width:560px){.place-grid{grid-template-columns:1fr 1fr 1fr}}
  .pcard{padding:0;overflow:hidden;display:flex;flex-direction:column;position:relative}
  .pcard:hover{border-color:var(--accent-line)}
  .pcard .thumb{width:100%;height:150px;flex:none;background:var(--accent-soft);display:grid;place-items:center;font-size:52px}
  .pcard .thumb img{width:100%;height:150px;object-fit:cover;display:block}
  .pcard .body{flex:1;padding:12px 13px 13px;min-width:0}
  .pcard .pname{font-weight:700;font-size:16px;letter-spacing:-.01em;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pcard .pmeta{font-size:12.5px;color:var(--ink-2);margin-top:5px;line-height:1.4}
  .pcard .pdesc{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pcard .ptip{font-size:12px;color:var(--warn);margin-top:6px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .pcard .plinks{margin-top:8px;font-size:12.5px}
  .pcard .badge{position:absolute;top:8px;right:8px;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .pcard .pdel{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:50%;
    background:rgba(0,0,0,.45);color:#fff;font-size:14px;display:grid;place-items:center;z-index:2;opacity:0;transition:opacity .15s}
  .pcard:hover .pdel{opacity:1}
  @media(hover:none){.pcard .pdel{opacity:.85}}
  .pcard .pdel:hover{background:#dc2626}

  /* 일정 */
  .day{margin-bottom:18px}
  .day .dhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .day .dtitle{font-weight:700;font-size:15px}
  .day .dcity{font-size:12.5px;color:var(--accent);background:var(--accent-soft);padding:2px 9px;border-radius:20px;font-weight:600}
  .day .dint{font-size:12px;color:var(--ink-3);margin-left:auto}
  .day .dstay{font-size:12.5px;color:var(--ink-2);margin-bottom:8px;padding-left:2px}
  .item{display:flex;gap:12px;padding:11px 14px;margin-bottom:8px;align-items:flex-start}
  .item .time{font-weight:700;color:var(--accent);font-size:13.5px;min-width:46px;flex:none;padding-top:1px}
  .item .it-body{flex:1;min-width:0}
  .item .it-title{font-weight:600;font-size:14.5px}
  .item .it-note{font-size:12.5px;color:var(--ink-2);margin-top:2px}
  .item .it-x{color:var(--ink-3);font-size:15px;width:28px;height:28px;border-radius:8px;flex:none}
  .item .it-x:hover{background:#fee2e2;color:#dc2626}
  .item.move{background:var(--accent-soft);border-color:var(--accent-line)}

  .quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .quick button{padding:9px 14px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
    font-size:13px;font-weight:600;color:var(--ink-2)}
  .quick button:hover{border-color:var(--accent);color:var(--accent)}

  /* 준비물 */
  .pack-cat{font-weight:700;font-size:14px;margin:16px 0 8px;color:var(--ink)}
  .check{display:flex;align-items:center;gap:11px;padding:11px 14px;margin-bottom:8px}
  .check input{width:20px;height:20px;accent-color:var(--accent);flex:none}
  .check .ctext{flex:1}
  .check.done .ctext{color:var(--ink-3);text-decoration:line-through}
  .check .cx{color:var(--ink-3);font-size:14px;width:26px;height:26px;border-radius:8px}
  .check .cx:hover{background:#fee2e2;color:#dc2626}

  /* 정보 스크랩 */
  .scrap{padding:14px 16px;margin-bottom:10px}
  .scrap .stitle{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .scrap .stag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:20px}
  .scrap .snote{font-size:13px;color:var(--ink-2);margin-top:6px}
  .scrap .slink{font-size:13px;margin-top:6px;display:inline-block;word-break:break-all}

  /* 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:560px){.modal-bg{align-items:center}}
  .modal{background:var(--surface);width:100%;max-width:var(--maxw);border-radius:20px 20px 0 0;padding:22px;
    max-height:88vh;overflow:auto}
  @media(min-width:560px){.modal{border-radius:20px;margin:0 16px}}
  .modal h2{font-size:18px;font-weight:700;margin:0 0 4px}
  .modal .mclose{position:absolute}
  .modal-head{display:flex;align-items:center;margin-bottom:16px}
  .modal-head h2{flex:1}
  .modal-head .x{font-size:22px;color:var(--ink-3);width:36px;height:36px;border-radius:10px}
  .modal-head .x:hover{background:var(--line)}

  /* 토스트 */
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:24px;font-size:14px;font-weight:600;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.2);
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* 로딩 스피너 */
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
  .spin.dark{border-color:var(--line);border-top-color:var(--accent)}
  @keyframes sp{to{transform:rotate(360deg)}}

  .status-line{font-size:12.5px;color:var(--ink-3);margin-top:10px;display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3)}
  .dot.on{background:var(--ok)}

  .kb{font-family:ui-monospace,monospace;background:var(--line);padding:1px 6px;border-radius:5px;font-size:12px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   여행 플래너 — 상태·저장·유틸
   ============================================================ */
const OAUTH_CLIENT_ID = "807880080829-04svu4ep866n4op85i3dd47r3mgvprsm.apps.googleusercontent.com";
const DRIVE_FILE_NAME = "travel-planner-data.json";   // 드라이브 저장 파일명(appDataFolder)
const STORE_KEY = "travelPlanner.v1";
const GEMINI_MODEL = "gemini-2.0-flash-lite";  // 기본값(무료 한도 가장 넉넉·설정에서 변경 가능)
const GEMINI_MODELS = [
  ["gemini-2.0-flash-lite","2.0 Flash Lite (가장 가벼움·한도 여유)"],
  ["gemini-2.0-flash","2.0 Flash (기본)"],
  ["gemini-2.5-flash","2.5 Flash (똑똑함)"],
  ["gemini-flash-latest","Flash 최신"],
];
// Groq (오픈소스 Llama 등, 무료·카드 없이 발급) — OpenAI 호환 API
const GROQ_MODEL = "llama-3.3-70b-versatile";
const GROQ_MODELS = [
  ["llama-3.3-70b-versatile","Llama 3.3 70B (똑똑함·추천)"],
  ["llama-3.1-8b-instant","Llama 3.1 8B (가장 빠름)"],
  ["openai/gpt-oss-20b","GPT-OSS 20B (오픈소스)"],
];
// 제공자 목록: 제미나이 / Groq
const PROVIDERS = [
  ["gemini","Google Gemini (무료 티어)"],
  ["groq","Groq · Llama (오픈소스·무료)"],
];

// Google Places 카테고리 → 검색 키워드(축제는 Places에 없어서 제외)
const PLACE_QUERY = {
  "관광지":"인기 관광지","역사·유적":"역사 유적지","미술관":"미술관","박물관":"박물관",
  "백화점":"백화점","시장":"전통시장","자연·공원":"공원","맛집":"맛집","카페":"카페"
};
// 추천 데이터는 앱이 직접 구글을 부르지 않고, 내 프록시(중계 함수)를 부른다.
// (Places 키는 프록시 안에만 있어 브라우저에 노출되지 않음)

const CATEGORIES = ["관광지","역사·유적","미술관","박물관","축제","백화점","시장","자연·공원","맛집","카페"];
const INFO_CATS = ["맛집","숙소","항공","기타"];
const PACK_TEMPLATE = [
  {cat:"서류", items:["여권","비자","여행자보험","항공권/e-티켓","숙소 예약확인"]},
  {cat:"전자기기", items:["휴대폰 충전기","보조배터리","멀티 어댑터","이어폰"]},
  {cat:"의류/세면", items:["속옷/양말","겉옷","세면도구","상비약"]},
  {cat:"금융", items:["여권 사본","현지 화폐/카드","해외 결제 가능 카드"]},
];

let state = load();
let ui = { screen:"home", tripId:null, tab:"추천", recCat:"전체", recFilter:"전체" };

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { trips:[], settings:{ geminiKey:"" } };
}
let saveTimer=null;
function save(){
  state.updatedAt = Date.now();   // 드라이브 충돌 병합 기준(더 최신본 채택)
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ if(e && (e.name==="QuotaExceededError" || /quota|exceeded/i.test(e.message||""))) toast("저장 공간이 가득 찼어요. 오래된 여행을 정리해 주세요",4000); }
  // 드라이브 동기화(로그인 되어 있으면 디바운스 저장)
  if(drive.token){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>drive.upload().catch(()=>{}), 1500); }
}
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function trip(){ return state.trips.find(t=>t.id===ui.tripId); }

/* AI 제공자 헬퍼 (제미나이 / Groq 공통) */
function aiProvider(){ return state.settings.provider||"gemini"; }
function aiKey(){ return (aiProvider()==="groq" ? state.settings.groqKey : state.settings.geminiKey)||""; }
function aiModel(){ return aiProvider()==="groq" ? (state.settings.groqModel||GROQ_MODEL) : (state.settings.geminiModel||GEMINI_MODEL); }
function aiName(){ return aiProvider()==="groq" ? "Groq" : "Gemini"; }

/* 날짜 유틸 */
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function parseD(s){ if(!s) return null; const d=new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
/* Date → 로컬 기준 YYYY-MM-DD (toISOString은 UTC라 KST에서 하루 밀림 → 직접 조합) */
function fmtISO(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${dd}`; }
function fmtMD(s){ const d=parseD(s); if(!d) return "-"; return (d.getMonth()+1)+"."+d.getDate(); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function tripSpan(t){
  const starts=t.cities.map(c=>parseD(c.start)).filter(Boolean);
  const ends=t.cities.map(c=>parseD(c.end)).filter(Boolean);
  if(!starts.length||!ends.length) return null;
  const s=new Date(Math.min(...starts)), e=new Date(Math.max(...ends));
  return {s,e,days:daysBetween(s,e)+1,nights:daysBetween(s,e)};
}
function ddayText(t){
  const sp=tripSpan(t); if(!sp) return "날짜 미정";
  const d=daysBetween(today(),sp.s);
  if(d>0) return "D-"+d;
  if(d===0) return "D-DAY";
  const de=daysBetween(today(),sp.e);
  if(de>=0) return "여행 중";
  return "여행 완료";
}
function periodText(t){
  const sp=tripSpan(t); if(!sp) return "기간 미정";
  return fmtMD(t.cities.reduce((a,c)=>!a||parseD(c.start)<parseD(a)?c.start:a,null))
    +" ~ "+fmtMD(t.cities.reduce((a,c)=>!a||parseD(c.end)>parseD(a)?c.end:a,null));
}

/* 예산 러프 계산 */
function budgetTotal(t){
  const b=t.budget||{}; const sp=tripSpan(t);
  const people=Math.max(1, +b.people||1);
  const days=sp?sp.days:1, nights=sp?sp.nights:1;
  const flight=(+b.flight||0)*people;
  const hotel=(+b.hotel||0)*Math.max(nights,1);
  const food=(+b.food||0)*people*days;
  const etc=(+b.etc||0)*people;
  return flight+hotel+food+etc;
}
function won(n){ if(!n) return "0"; return n.toLocaleString("ko-KR"); }
function wonShort(n){
  if(!n) return "0원";
  if(n>=100000000) return (n/100000000).toFixed(1).replace(/\.0$/,"")+"억";
  if(n>=10000) return Math.round(n/10000).toLocaleString()+"만원";
  return n.toLocaleString()+"원";
}

/* 장소 사진 검색: 영문명 우선 → ①Openverse(실사 사진 통합검색) ②위키백과 대표사진 ③위키미디어 공용(지도·로고 제외) */
const BAD_IMG=/(map|plan|diagram|locator|logo|flag|seal|icon|blank|svg|coat.?of.?arms|schematic|floorplan|layout)/i;
async function findPhoto(query){
  const q=encodeURIComponent(query);
  // ① Openverse — 여러 무료 사진 소스를 통합 검색(실제 사진, 지도·도면 거의 없음)
  try{
    const r=await fetch(`https://api.openverse.org/v1/images/?q=${q}&page_size=5&mature=false`);
    if(r.ok){ const j=await r.json();
      const hit=(j.results||[]).find(x=>(x.thumbnail||x.url) && !BAD_IMG.test(x.title||""));
      if(hit) return hit.thumbnail||hit.url;
    }
  }catch(e){}
  // ② 영문 위키백과 문서의 대표(리드) 사진
  try{
    const url=`https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*`
      +`&prop=pageimages&piprop=thumbnail&pithumbsize=500&generator=search&gsrsearch=${q}&gsrlimit=1`;
    const j=await (await fetch(url)).json();
    const pages=j&&j.query&&j.query.pages;
    if(pages){ const pg=Object.values(pages)[0]; const u=pg&&pg.thumbnail&&pg.thumbnail.source;
      if(u && !/\.svg/i.test(u)) return u; }
  }catch(e){}
  // ③ 위키미디어 공용 — 지도/도면/로고/SVG 걸러내고 첫 실사 사진
  try{
    const url=`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*`
      +`&generator=search&gsrnamespace=6&gsrsearch=${q}&gsrlimit=10&prop=imageinfo&iiprop=url%7Cmime&iiurlwidth=500`;
    const j=await (await fetch(url)).json();
    const pages=j&&j.query&&j.query.pages;
    if(pages){
      const cand=Object.values(pages)
        .map(pg=>({title:pg.title||"",info:(pg.imageinfo&&pg.imageinfo[0])||null}))
        .filter(x=>x.info && /image\/(jpeg|png|webp)/i.test(x.info.mime||"") && !BAD_IMG.test(x.title));
      if(cand.length){ const u=cand[0].info.thumburl||cand[0].info.url; if(u) return u; }
    }
  }catch(e){}
  return null;
}
async function hydrateThumbs(){
  const t=trip(); if(!t) return;
  const boxes=document.querySelectorAll(".thumb[data-thumbq]");
  for(const box of boxes){
    const pid=box.getAttribute("data-pid");
    if(box._loading) continue; box._loading=true;
    const p=t.places.find(x=>x.id===pid); if(!p) continue;
    (async()=>{
      // 영문명 있으면 그걸로(사진DB는 영어색인), 없으면 도시+이름
      const query=(p.en||"").trim() || ((p.city||"")+" "+p.name);
      const src=await findPhoto(query);
      if(src){
        p.thumb=src; save();
        box.innerHTML=`<img src="${src.replace(/"/g,'&quot;')}" alt="">`;
        box.removeAttribute("data-thumbq");
      }
    })();
  }
}
function scheduledDay(t,placeId){
  for(const d of t.schedule){ if(d.items.some(i=>i.placeId===placeId)) return d.dayIndex; }
  return null;
}

function tabSchedule(t){
  const sp=tripSpan(t);
  const staysBtn=`<button class="btn ghost sm" data-stays style="margin-bottom:10px">🏨 숙소 관리 (${t.stays.length})</button>`;
  const transBtn=`<button class="btn ghost sm" data-transports style="margin-bottom:14px">✈️ 이동·비행기 (${t.transports.length})</button>`;
  const autoBtn=`<button class="btn" data-autoschedule style="margin-bottom:14px">⚡ 자동으로 일정 짜기 (AI)</button>`;
  let days="";
  if(t.schedule.length){
    days=t.schedule.map(d=>dayBlock(t,d)).join("");
    days+=`<div class="quick">
      <button data-quick="relax">🌿 더 여유롭게</button>
      <button data-quick="pack">🔥 더 알차게</button>
      <button data-quick="chat">💬 채팅으로 수정</button>
    </div>`;
  }else{
    days=`<div class="empty" style="padding:36px 12px"><div class="big">📅</div>
      <div class="sub">추천 탭에서 <b>찜</b>한 장소가 ${t.places.filter(p=>p.status==="candidate").length}곳 있어요.<br>
      <b>자동으로 일정 짜기</b>를 누르면 AI가 날짜별로 편성해요</div></div>`;
  }
  return `${autoBtn}${staysBtn}${transBtn}${days}`;
}
function dayBlock(t,d){
  const stay=stayForDate(t,d.date);
  const intLabel={relaxed:"여유",normal:"알차게",packed:"빡세게"}[d.intensity||t.intensity]||"";
  const items=d.items.map(it=>`
    <div class="card item">
      <div class="time">${esc(it.time||"")}</div>
      <div class="it-body">
        <div class="it-title">${esc(it.title)}</div>
        ${it.note?`<div class="it-note">${esc(it.note)}</div>`:""}
      </div>
      <button class="it-x" data-item-del="${d.dayIndex}|${it.id}">✕</button>
    </div>`).join("") || `<div class="sub" style="padding:6px 2px">일정 없음 (여유일)</div>`;
  return `
    <div class="day">
      <div class="dhead">
        <span class="dtitle">Day ${d.dayIndex} · ${esc(fmtMD(d.date))}</span>
        ${d.city?`<span class="dcity">${esc(d.city)}</span>`:""}
        <span class="dint">강도: ${esc(intLabel)} <button data-dayint="${d.dayIndex}" style="color:var(--accent);font-weight:600">변경</button></span>
      </div>
      ${stay?`<div class="dstay">🏨 ${esc(stay.name)}</div>`:""}
      ${items}
    </div>`;
}
function stayForDate(t,date){
  const d=parseD(date); if(!d) return null;
  return t.stays.find(s=>{ const ci=parseD(s.checkIn),co=parseD(s.checkOut); return ci&&co&&d>=ci&&d<co; })||null;
}

function tabPacking(t){
  const loadBtn = t.packing.length? "" :
    `<button class="btn ghost sm" data-loadtemplate style="margin-bottom:14px">📋 기본 준비물 템플릿 불러오기</button>`;
  const aiBtn = `<button class="btn ghost sm" data-packai style="margin-bottom:14px">✨ 이 여행 맞춤 준비물 추천 (AI)</button>`;
  const cats = t.packing.map((c,ci)=>{
    const items=c.items.map((it,ii)=>`
      <label class="card check ${it.checked?'done':''}">
        <input type="checkbox" data-check="${ci}|${ii}" ${it.checked?'checked':''}>
        <span class="ctext">${esc(it.name)}</span>
        <button class="cx" data-packdel="${ci}|${ii}">✕</button>
      </label>`).join("");
    return `<div class="pack-cat">${esc(c.cat)}</div>${items}
      <button class="addlink" data-packadd="${ci}">＋ 항목 추가</button>`;
  }).join("");
  return `${loadBtn}${aiBtn}
    ${cats || `<div class="empty" style="padding:36px 12px"><div class="big">🎒</div>
      <div class="sub">템플릿을 불러오거나 AI 추천으로 시작하세요</div></div>`}
    ${t.packing.length?`<button class="addlink" data-packcat style="margin-top:12px">＋ 카테고리 추가</button>`:""}`;
}

/* ---- 탭 D. 정보 ---- */
function tabInfo(t){
  const chips=["전체",...INFO_CATS].map(c=>`<button class="chip ${(ui.infoFilter||"전체")===c?'on':''}" data-infofilter="${c}">${c}</button>`).join("");
  let list=t.info; const f=ui.infoFilter||"전체";
  if(f!=="전체") list=list.filter(s=>s.cat===f);
  const cards=list.map(s=>`
    <div class="card scrap">
      <div class="stitle">${esc(s.title)} <span class="stag">${esc(s.cat)}</span>
        <button class="cx" data-scrapdel="${s.id}" style="margin-left:auto;color:var(--ink-3)">✕</button></div>
      ${s.url?`<a class="slink" href="${esc(s.url)}" target="_blank" rel="noopener">🔗 ${esc(s.url)}</a>`:""}
      ${s.note?`<div class="snote">${esc(s.note)}</div>`:""}
    </div>`).join("");

      <div class="sub">맛집·숙소·항공 정보를 스크랩해 두세요</div></div>`}`;
}

/* ============================================================
   이벤트 바인딩 (이벤트 위임)
   ============================================================ */
function bindGlobal(){
  const app=document.getElementById("app");
  app.onclick=onClick;
  app.oninput=onInput;
  app.onchange=onChange;
  if(ui.screen==="new") updateBudgetPreview();
  if(ui.screen==="trip" && ui.tab==="추천") hydrateThumbs();
}
function onClick(e){
  const el=e.target.closest("[data-open],[data-del],[data-new],[data-edit],[data-settings],[data-back],[data-home],"
    +"[data-addcity],[data-crm],[data-int],[data-create],[data-tab],[data-cat],[data-filter],"
    +"[data-recommend],[data-recity],[data-place-toggle],[data-place-del],[data-autoschedule],[data-stays],[data-transports],"
    +"[data-quick],[data-item-del],[data-dayint],[data-loadtemplate],[data-packai],[data-check],"
    +"[data-packadd],[data-packcat],[data-packdel],[data-scrapadd],[data-scrapdel],[data-infofilter]");
  if(!el) return;
  const d=el.dataset;
  if("open" in d && !e.target.closest("[data-del]")) return go("trip",{tripId:d.open,tab:"추천",recCat:"전체",recCity:"전체",recFilter:"전체"});
  if("del" in d){ e.stopPropagation(); if(confirm("이 여행을 삭제할까요?")){ state.trips=state.trips.filter(t=>t.id!==d.del); save(); render(); } return; }
  if("new" in d){ draft=null; ui.editing=false; return go("new"); }
  if("edit" in d){ draft=JSON.parse(JSON.stringify(trip())); ui.editing=true; return go("new"); }
  if("settings" in d) return openSettings();
  if("back" in d){ const wasEdit=ui.editing; const bid=draft&&draft.id; draft=null; ui.editing=false; return wasEdit?go("trip",{tripId:bid}):go("home"); }
  if("home" in d) return go("home");
  if("addcity" in d){ draft.cities.push({id:uid(),name:"",start:"",end:""}); return render(); }
  if("crm" in d){ draft.cities=draft.cities.filter(c=>c.id!==d.crm); return render(); }
  if("int" in d){ draft.intensity=d.int; return render(); }
  if("create" in d) return createTrip();
  if("tab" in d) return go("trip",{tab:d.tab});
  if("cat" in d){ ui.recCat=d.cat; return render(); }
  if("recity" in d){ ui.recCity=d.recity; return render(); }
  if("filter" in d){ ui.recFilter=d.filter; return render(); }
  if("recommend" in d){
    if(hasPlaces()) return ui.recCat==="전체" ? doRecommendPlacesAll() : doRecommendPlaces(ui.recCat);
    return ui.recCat==="전체" ? doRecommendAll() : doRecommend();
  }
  if("placeToggle" in d) return togglePlace(d.placeToggle);
  if("placeDel" in d) return delPlace(d.placeDel);
  if("autoschedule" in d) return doAutoSchedule();
  if("stays" in d) return openStays();
  if("transports" in d) return openTransports();
  if("quick" in d) return doQuick(d.quick);
  if("itemDel" in d) return delItem(d.itemDel);
  if("dayint" in d) return changeDayIntensity(+d.dayint);
  if("loadtemplate" in d){ trip().packing=PACK_TEMPLATE.map(c=>({cat:c.cat,items:c.items.map(n=>({name:n,checked:false}))})); save(); return render(); }
  if("packai" in d) return doPackAI();
  if("packadd" in d) return addPackItem(+d.packadd);
  if("packcat" in d) return addPackCat();
  if("packdel" in d){ e.preventDefault(); return delPack(d.packdel); }  // label 안 버튼이라 기본 동작(체크 토글) 막기
  if("scrapadd" in d) return addScrap();
  if("scrapdel" in d){ const t=trip(); t.info=t.info.filter(s=>s.id!==d.scrapdel); save(); return render(); }
  if("infofilter" in d){ ui.infoFilter=d.infofilter; return render(); }
}
function onInput(e){
  const t=e.target;
  if(t.id==="f-name"&&draft){ draft.name=t.value; }
  if(t.id==="f-comp"&&draft){ draft.companions=t.value; }
  if(t.dataset.cf&&draft){
    const row=t.closest("[data-ci]"); const c=draft.cities.find(x=>x.id===row.dataset.ci);
    if(c) c[t.dataset.cf]=t.value;
  }
  if(t.id&&t.id.startsWith("b-")&&draft){ draft.budget[t.id.slice(2)]=t.value; updateBudgetPreview(); }
}
function onChange(e){
  const d=e.target.dataset;
  if("check" in d){ const [ci,ii]=d.check.split("|").map(Number); const t=trip();
    t.packing[ci].items[ii].checked=e.target.checked;
    const lbl=e.target.closest("label.check"); if(lbl) lbl.classList.toggle("done", e.target.checked);  // 전체 재렌더 대신 해당 항목만 갱신(포커스·스크롤 유지)
    save(); }
}
function updateBudgetPreview(){
  if(!draft) return;
  const el=document.getElementById("b-preview"); if(!el) return;
  const tot=budgetTotal(draft);
  el.innerHTML = tot? `총 예산 약 <b style="color:var(--accent);margin-left:4px">${won(tot)}원</b> (${wonShort(tot)})` : "단가를 넣으면 총액이 자동 계산돼요";
}
function createTrip(){
  if(!draft.name.trim()){ toast("여행 이름을 입력해 주세요"); document.getElementById("f-name").focus(); return; }
  if(!draft.cities.some(c=>c.name.trim())){ toast("도시를 최소 1개 입력해 주세요"); return; }
  draft.cities=draft.cities.filter(c=>c.name.trim());
  const badCity=draft.cities.find(c=>c.start&&c.end&&c.end<c.start);
  if(badCity){ toast(`'${badCity.name}' 도시의 종료일이 시작일보다 빨라요`); return; }
  if(ui.editing){
    const real=state.trips.find(x=>x.id===draft.id);
    if(real){ real.name=draft.name; real.cities=draft.cities; real.budget=draft.budget;
      real.companions=draft.companions; real.intensity=draft.intensity; }
    const id=draft.id; draft=null; ui.editing=false; save();
    go("trip",{tripId:id}); toast("여행 정보를 수정했어요");
    return;
  }
  state.trips.unshift(draft);
  const id=draft.id; draft=null; save();
  go("trip",{tripId:id,tab:"추천",recCat:"전체",recCity:"전체",recFilter:"전체"});
  toast("여행이 만들어졌어요 🎉");
}

/* 장소 상태 토글: 미선택 → 찜 → (일정배치는 자동편성이) / 다시 누르면 해제·후보복귀 */
function togglePlace(id){
  const t=trip(); const p=t.places.find(x=>x.id===id); if(!p) return;
  if(p.status==="scheduled"){
    // 일정에서 빼고 후보로 복귀
    t.schedule.forEach(d=>{ d.items=d.items.filter(i=>i.placeId!==id); });
    p.status="candidate"; toast("일정에서 빼고 후보로 되돌렸어요");
  }else if(p.status==="candidate"){ p.status="none"; }
  else { p.status="candidate"; }
  save(); render();
}
/* 장소 완전 삭제(잘못된/중복 항목 제거) — 일정에 있으면 일정에서도 제거 */
function delPlace(id){
  const t=trip(); const p=t.places.find(x=>x.id===id); if(!p) return;
  if(!confirm(`'${p.name}' 을(를) 삭제할까요?`)) return;
  t.schedule.forEach(d=>{ d.items=d.items.filter(i=>i.placeId!==id); });
  t.places=t.places.filter(x=>x.id!==id);
  save(); render();
}
/* 추천 목록 전체 삭제 (설정 모달에서 호출) */
function clearPlaces(){
  const t=trip(); if(!t||!t.places.length) return;
  if(!confirm(`추천 목록 ${t.places.length}곳을 모두 삭제할까요? (일정에 넣은 것도 함께 지워져요)`)) return;
  t.schedule.forEach(d=>{ d.items=d.items.filter(i=>!i.placeId); });   // 장소 기반 일정 항목 제거(이동 등은 유지)
  t.places=[];
  save(); closeModal(); render(); toast("추천 목록을 모두 지웠어요");
}

/* 준비물 */
function addPackItem(ci){ const name=prompt("추가할 항목"); if(!name) return; const t=trip();
  t.packing[ci].items.push({name:name.trim(),checked:false}); save(); render(); }
function addPackCat(){ const name=prompt("카테고리 이름"); if(!name) return; const t=trip();
  t.packing.push({cat:name.trim(),items:[]}); save(); render(); }
function delPack(key){ const [ci,ii]=key.split("|").map(Number); const t=trip();
  t.packing[ci].items.splice(ii,1); if(!t.packing[ci].items.length) t.packing.splice(ci,1); save(); render(); }

/* 정보 스크랩 */
function addScrap(){
  modal(`<div class="modal-head"><h2>정보 스크랩</h2><button class="x" data-mclose>✕</button></div>
    <div class="field"><label>제목</label><input class="input" id="sc-title" placeholder="예: 딘타이펑 본점"></div>
    <div class="field"><label>링크(URL) <span class="hint">선택</span></label><input class="input" id="sc-url" placeholder="https://"></div>
    <div class="field"><label>분류</label><div class="seg" id="sc-cat">${INFO_CATS.map((c,i)=>`<button class="${i===0?'on':''}" data-sccat="${c}">${c}</button>`).join("")}</div></div>
    <div class="field"><label>메모 <span class="hint">선택</span></label><textarea class="input" id="sc-note"></textarea></div>
    <button class="btn" id="sc-save">저장</button>`);
  let cat=INFO_CATS[0];
  document.getElementById("sc-cat").onclick=e=>{const b=e.target.closest("[data-sccat]");if(!b)return;
    cat=b.dataset.sccat;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));};
  document.getElementById("sc-save").onclick=()=>{
    const title=document.getElementById("sc-title").value.trim();
    if(!title){ toast("제목을 입력해 주세요"); return; }
    const t=trip(); t.info.unshift({id:uid(),title,url:document.getElementById("sc-url").value.trim(),
      note:document.getElementById("sc-note").value.trim(),cat});
    save(); closeModal(); render();
  };
}

/* 숙소 관리 */
function openStays(){
  const t=trip();
  const rows=()=>t.stays.map(s=>`<div class="card place" style="margin-bottom:8px"><div class="body">
      <div class="pname">🏨 ${esc(s.name)}</div>
      <div class="pmeta">${esc(fmtMD(s.checkIn))} ~ ${esc(fmtMD(s.checkOut))}${s.location?" · "+esc(s.location):""}</div>
    </div><button class="badge add" data-sdel="${s.id}">삭제</button></div>`).join("")||`<div class="sub">등록된 숙소 없음</div>`;
  modal(`<div class="modal-head"><h2>숙소 관리</h2><button class="x" data-mclose>✕</button></div>
    <div class="sub" style="margin-bottom:12px">같은 도시라도 기간을 나눠 여러 숙소를 등록할 수 있어요</div>
    <div id="stay-list">${rows()}</div>
    <div class="field" style="margin-top:16px"><label>숙소 추가</label>
      <input class="input" id="st-name" placeholder="숙소 이름" style="margin-bottom:8px">
      <input class="input" id="st-loc" placeholder="위치(선택)" style="margin-bottom:8px">
      <div class="row"><input class="input" id="st-in" type="date" title="체크인"><input class="input" id="st-out" type="date" title="체크아웃"></div>
    </div>
    <button class="btn" id="st-add">＋ 추가</button>`);
  const refresh=()=>{ document.getElementById("stay-list").innerHTML=rows(); };
  document.querySelector(".modal").addEventListener("click",e=>{
    const b=e.target.closest("[data-sdel]"); if(!b) return;
    t.stays=t.stays.filter(s=>s.id!==b.dataset.sdel); save(); refresh();
  });
  document.getElementById("st-add").onclick=()=>{
    const name=document.getElementById("st-name").value.trim();
    const ci=document.getElementById("st-in").value, co=document.getElementById("st-out").value;
    if(!name||!ci||!co){ toast("이름·체크인·체크아웃을 입력해 주세요"); return; }
    if(co<=ci){ toast("체크아웃은 체크인보다 뒤 날짜여야 해요"); return; }
    t.stays.push({id:uid(),name,location:document.getElementById("st-loc").value.trim(),checkIn:ci,checkOut:co});
    t.stays.sort((a,b)=>a.checkIn<b.checkIn?-1:1);
    save(); refresh();
    document.getElementById("st-name").value="";document.getElementById("st-loc").value="";
  };
}

/* 도시 간 이동 */
function openTransports(){
  const t=trip();
  const rows=()=>t.transports.map(x=>`<div class="card place" style="margin-bottom:8px"><div class="body">
      <div class="pname">${esc(x.mode||"🚄 이동")} · ${esc(x.fromCity)} → ${esc(x.toCity)}</div>
      <div class="pmeta">${esc(fmtMD(x.date))} · ${esc(x.depart||"")}${x.arrive?" → "+esc(x.arrive):""}</div>
    </div><button class="badge add" data-tdel="${x.id}">삭제</button></div>`).join("")||`<div class="sub">등록된 이동 없음</div>`;
  const cityOpts=[...t.cities.map(c=>c.name),"🏠 집(출발/귀가)"].map(c=>`<option>${esc(c)}</option>`).join("");
  modal(`<div class="modal-head"><h2>이동 · 비행기</h2><button class="x" data-mclose>✕</button></div>
    <div class="sub" style="margin-bottom:12px">도시 간 이동뿐 아니라 <b>여행 도착·귀환 비행기</b>도 넣으세요.<br>· 도착: <b>🏠 집 → 첫 도시</b> (도착시각 입력)<br>· 귀환: <b>마지막 도시 → 🏠 집</b> (출발시각 입력)<br>자동편성이 <b>도착 후~출발 전 시간에만</b> 일정을 배치해요.</div>
    <div id="tr-list">${rows()}</div>
    <div class="field" style="margin-top:16px"><label>이동 추가</label>
      <div class="row" style="margin-bottom:8px"><select class="input" id="tr-from">${cityOpts}</select><span>→</span><select class="input" id="tr-to">${cityOpts}</select></div>
      <input class="input" id="tr-mode" placeholder="수단(예: 기차 / 비행기)" style="margin-bottom:8px">
      <div class="row"><input class="input" id="tr-date" type="date"><input class="input" id="tr-dep" type="time" title="출발"><input class="input" id="tr-arr" type="time" title="도착"></div>
    </div>
    <button class="btn" id="tr-add">＋ 추가</button>`);
  const refresh=()=>{ document.getElementById("tr-list").innerHTML=rows(); };
  document.querySelector(".modal").addEventListener("click",e=>{
    const b=e.target.closest("[data-tdel]"); if(!b) return;
    t.transports=t.transports.filter(x=>x.id!==b.dataset.tdel); save(); refresh();
  });
  document.getElementById("tr-add").onclick=()=>{
    const from=document.getElementById("tr-from").value,to=document.getElementById("tr-to").value;
    const date=document.getElementById("tr-date").value;
    if(!date){ toast("이동 날짜를 입력해 주세요"); return; }
    t.transports.push({id:uid(),fromCity:from,toCity:to,mode:document.getElementById("tr-mode").value.trim(),
      date,depart:document.getElementById("tr-dep").value,arrive:document.getElementById("tr-arr").value});
    save(); refresh();
  };
}

/* 일정 아이템/강도 */
function delItem(key){ const [di,id]=key.split("|"); const t=trip();
  const day=t.schedule.find(d=>d.dayIndex==di); if(!day) return;
  const it=day.items.find(i=>i.id===id);
  if(it&&it.placeId){ const p=t.places.find(x=>x.id===it.placeId); if(p) p.status="candidate"; } // 후보 복귀
  day.items=day.items.filter(i=>i.id!==id); save(); render();
}
function changeDayIntensity(di){
  const t=trip(); const day=t.schedule.find(d=>d.dayIndex===di); if(!day) return;
  const order=["relaxed","normal","packed"]; const cur=day.intensity||t.intensity;
  day.intensity=order[(order.indexOf(cur)+1)%3];
  save(); render(); toast("Day "+di+" 강도: "+({relaxed:"여유",normal:"알차게",packed:"빡세게"}[day.intensity])+" · 일정에 반영하려면 자동편성을 다시 눌러주세요",3200);
}
function doQuick(kind){
  if(kind==="chat"){ const msg=prompt("어떻게 바꿀까요? (예: 오전은 미술관, 오후는 쇼핑 위주로)"); if(msg) doAutoSchedule(msg); return; }
  if(kind==="relax") doAutoSchedule("전체적으로 하루 일정을 더 여유롭게(장소 수 줄이고 부하 낮춤) 다시 짜줘.");
  if(kind==="pack") doAutoSchedule("전체적으로 하루를 더 알차게(부하 범위 내에서 장소 더 채움) 다시 짜줘.");
}

/* ============================================================
   설정 모달 (AI 제공자 선택 + 키 + 구글 로그인/동기화)
   ============================================================ */

      </div>
      <div class="field">

          ${GROQ_MODELS.map(([v,l])=>`<option value="${v}" ${(state.settings.groqModel||GROQ_MODEL)===v?'selected':''}>${l}</option>`).join("")}

  return `<div class="field">

/* ============================================================
   AI 연동 (Gemini / Groq 공통) — JSON 응답
   ============================================================ */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function parseJSONLoose(txt){
  txt=(txt||"").replace(/^```json\s*|^```\s*|```$/gm,"").trim();
  try{ return JSON.parse(txt); }catch(e){}
  const m=txt.match(/[\[{][\s\S]*[\]}]/);   // 본문에서 JSON만 추출(모델이 앞뒤로 말 붙였을 때)
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  throw new Error("AI 응답을 이해하지 못했어요. 다시 시도해 주세요.");
}
async function aiJSON(prompt, _retry){
  const key=aiKey();
  if(!key){ openSettings(); throw new Error("nokey"); }
  const provider=aiProvider(), model=aiModel();
  let res, txt;
  if(provider==="groq"){
    res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model,temperature:0.7,max_tokens:8000,messages:[{role:"user",content:prompt}]})});
  }else{
    res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,responseMimeType:"application/json"}})});
  }
  if(!res.ok){
    const e=await res.text();
    if(res.status===429){
      if(!_retry){
        // Groq/Gemini가 응답에 알려주는 '몇 초 뒤 재시도' 시간을 읽어 그만큼만 대기
        let wait=0;
        const hdr=parseFloat(res.headers.get("retry-after")); if(hdr>0) wait=hdr*1000;
        if(!wait){ const m=e.match(/(?:try again in|retry in)\s*([\d.]+)\s*s/i); if(m) wait=parseFloat(m[1])*1000; }
        wait=Math.min(Math.max(wait||15000, 3000), 65000);   // 3~65초 사이로 보정
        toast(`분당 한도에 걸려 ${Math.ceil(wait/1000)}초 뒤 자동으로 다시 시도해요…`, wait+2000);
        await sleep(wait); return aiJSON(prompt,true);
      }
      throw new Error("429 분당 한도 초과: 1분쯤 기다렸다 다시 하거나, 설정에서 더 가벼운 모델(Llama 8B)로 바꿔보세요.");
    }
    if(res.status===401 || /API key not valid|API_KEY_INVALID|invalid_api_key/i.test(e)) throw new Error("API 키가 올바르지 않아요. 설정에서 다시 확인해 주세요.");
    if(res.status===404 || /model.*(not found|decommission)/i.test(e)) throw new Error("이 모델을 쓸 수 없어요. 설정에서 다른 모델을 골라보세요.");
    throw new Error(aiName()+" 오류 "+res.status+": "+e.slice(0,160));
  }
  const data=await res.json();
  if(provider==="groq") txt=data?.choices?.[0]?.message?.content||"";
  else txt=data?.candidates?.[0]?.content?.parts?.[0]?.text||"";
  return parseJSONLoose(txt);
}

/* 추천 결과를 중복 없이 추가 (이름·영문명 둘 다로 중복 판정) */
function normKey(s){ return (s||"").toLowerCase().replace(/[\s·\-_.()·,]/g,""); }
function addRecommended(t, arr, catFn){
  const firstCity=(t.cities.find(c=>c.name)||{}).name||"";
  const seen=new Set();
  t.places.forEach(p=>{ if(p.name)seen.add(normKey(p.name)); if(p.en)seen.add(normKey(p.en)); });
  let added=0;
  for(const r of (Array.isArray(arr)?arr:[])){
    if(!r||!r.name) continue;
    const kName=normKey(r.name), kEn=normKey(r.en);
    if(seen.has(kName) || (kEn && seen.has(kEn))) continue;   // 이미 있거나 이번 응답 내 중복
    seen.add(kName); if(kEn) seen.add(kEn);
    t.places.push({id:uid(),name:r.name,en:r.en||"",city:r.city||firstCity,category:catFn(r),
      desc:r.desc||"",stayHours:r.stayHours||"",activity:(r.activity||"").replace(/[^저중고]/g,"")||"중",
      bestTime:r.bestTime||"",status:"none"});
    added++;
  }
  return added;
}

// 기본 프록시 주소(내 구글 클라우드 함수) — 설정에서 비워도 이걸로 동작. 키는 함수 안에 있어 안전
const DEFAULT_PROXY = "https://places-807880080829.asia-northeast3.run.app";
function proxyBase(){ return (((state.settings.proxyUrl||"").trim())||DEFAULT_PROXY).replace(/\/+$/,""); }
function hasPlaces(){ return !!proxyBase(); }
function placeErr(e){
  const m=(e&&e.message)||"";
  if(/Failed to fetch|NetworkError|load failed|proxy 0/i.test(m)) return "프록시에 연결 못 했어요. 설정의 프록시 URL과 함수 배포 상태를 확인하세요.";

/* Places에서 받은 장소를 중복 없이 여행에 추가 (구글 place_id·이름으로 판정) */
function addPlacesToTrip(t, arr){
  const seen=new Set();
  t.places.forEach(p=>{ if(p.placeId)seen.add("id:"+p.placeId); if(p.name)seen.add("nm:"+normKey(p.name)); });
  let added=0;
  for(const p of arr){
    if(!p.name) continue;
    const idk="id:"+p.placeId, nmk="nm:"+normKey(p.name);
    if((p.placeId&&seen.has(idk)) || seen.has(nmk)) continue;
    if(p.placeId) seen.add(idk); seen.add(nmk);
    t.places.push(p); added++;
  }
  return added;
}
// 구글 장소 유형(types) → 우리 카테고리. 실제 유형으로 재분류(디즈니랜드가 유적으로 뜨는 것 방지)
function typesToCategory(types, fallback){
  const t=types||[], has=x=>t.includes(x);
  if(has("amusement_park")||has("zoo")||has("aquarium")||has("theme_park")) return "관광지";
  if(has("art_gallery")) return "미술관";
  if(has("museum")||has("art_museum")) return t.includes("art_museum")?"미술관":"박물관";
  if(has("department_store")||has("shopping_mall")) return "백화점";
  if(has("market")||has("supermarket")||has("grocery_store")) return "시장";
  if(has("national_park")||has("park")||has("garden")||has("botanical_garden")) return "자연·공원";
  if(has("cafe")||has("coffee_shop")||has("bakery")) return "카페";
  if(has("restaurant")||has("meal_takeaway")||has("food")) return "맛집";
  if(has("historical_landmark")||has("historical_place")||has("hindu_temple")||has("church")||has("buddhist_temple")||has("mosque")) return "역사·유적";
  if(has("tourist_attraction")||has("point_of_interest")) return "관광지";
  return fallback;
}
async function placesSearch(city, category){
  const base=proxyBase();
  const q=encodeURIComponent(`${city} ${PLACE_QUERY[category]||category}`);
  const r=await fetch(`${base}?q=${q}&city=${encodeURIComponent(city)}&max=15`);
  if(!r.ok){ const tx=await r.text().catch(()=>""); throw new Error("proxy "+r.status+": "+tx.slice(0,140)); }
  const data=await r.json();
  // 함수가 이미 한글이름·설명까지 붙여서 줌 → 그대로 표시
  return (data.places||[]).map(p=>({
    id:uid(), placeId:p.id||"", name:p.name||"", en:p.en||"", city, category:typesToCategory(p.types,category),
    desc:p.desc||"", rating:p.rating||"", reviews:p.reviews||"",
    thumb: p.photoName?`${base}?photo=${encodeURIComponent(p.photoName)}`:"",
    lat:p.lat, lng:p.lng, address:p.address||"",
    stayHours:p.stayHours||"", activity:p.activity||"", bestTime:"", status:"none"
  }));
}
/* 받아온 장소에 LLM으로 한글 설명·체류시간·활동강도 보강(AI 키 있을 때만) */
function hasHangul(s){ return /[가-힣]/.test(s||""); }
// 이름 바뀐 뒤 같은 이름끼리 겹치는 중복 제거(찜/일정 상태 있는 걸 우선 보존)
function dedupePlacesByName(t){
  const rank=x=>x.status==="scheduled"?3:x.status==="candidate"?2:(x.thumb?1:0);
  const idx={}, keep=[];
  for(const p of t.places){
    const k=normKey(p.name); if(!k){ keep.push(p); continue; }
    if(k in idx){ if(rank(p)>rank(keep[idx[k]])) keep[idx[k]]=p; continue; }
    idx[k]=keep.length; keep.push(p);
  }
  t.places=keep;
}
async function enrichPlaces(t, onProgress){
  if(!aiKey()) return {applied:0,failed:0,nokey:true};
  const todo=t.places.filter(p=>!p.desc || !hasHangul(p.name)).slice(0,90);
  if(!todo.length) return {applied:0,failed:0};
  const CHUNK=15; let applied=0, failed=0;
  const chunks=[]; for(let s=0;s<todo.length;s+=CHUNK) chunks.push(todo.slice(s,s+CHUNK));
  for(let ci=0; ci<chunks.length; ci++){
    if(ci>0) await sleep(3500);   // Groq 분당 한도(429) 회피: 청크 사이 간격
    const chunk=chunks[ci];
    const byName={}; chunk.forEach(p=>{ const k=normKey(p.name); if(k) byName[k]=p; });
    const prompt=`너는 한국인 여행 가이드야. 아래는 구글 지도에서 가져온 실제 장소 목록이야. 각 장소마다 아래 항목을 채워줘.
- "name": 입력한 이름을 **그대로 복사**(도시·주소는 빼고 이름만, 매칭용).
- "ko": 한국인이 부르는 **순수 한글** 이름. 한자·영어·현지어면 한글로 바꿔줘(한자 섞지 말고 완전한 한글). 예) 东方明珠→동방명주, The Bund→와이탄, Yu Garden→예원, Prince Gong Mansion→공왕부.
- "desc": 이 장소가 어떤 곳이고 무엇을 볼 수 있는지 한국어 한 문장 설명(15~60자, 구체적으로. "카페" 같은 뻔한 말 말고).
- "stayHours": 예상 체류시간(시간, 숫자만. 예: 1.5).
- "activity": "저" 또는 "중" 또는 "고" 중 하나.
[장소 목록]
${chunk.map((p,i)=>`${i+1}. ${p.name} / ${p.city} / ${p.address||"주소미상"}`).join("\n")}
설명·다른 말 절대 없이, 아래 형식의 JSON 배열만 출력:
[{"name":"이름만","ko":"한글이름","desc":"한 문장 설명","stayHours":2,"activity":"중"}]`;
    let arr=null;
    try{ arr=await aiJSON(prompt); }
    catch(e){ failed++; console.warn("enrich 실패:", e && e.message); continue; }
    if(!Array.isArray(arr)){ failed++; console.warn("enrich: 배열 아님", arr); continue; }
    arr.forEach((r,ri)=>{
      if(!r) return;
      let p=null;
      if(r.name){ const rk=normKey(r.name);
        p=byName[rk] || chunk.find(x=>{ const xk=normKey(x.name); return xk && (rk===xk || rk.startsWith(xk) || rk.indexOf(xk)>=0); }); }
      if(!p) p=chunk[ri];   // 최후: 순서로
      if(!p) return;
      if(r.ko && hasHangul(r.ko) && !hasHangul(p.name)){ if(!p.en) p.en=p.name; p.name=r.ko; }
      if(r.desc){ p.desc=String(r.desc); }
      if(r.stayHours) p.stayHours=r.stayHours;
      if(r.activity) p.activity=(""+r.activity).replace(/[^저중고]/g,"")||p.activity||"중";
      applied++;
    });
    save(); if(onProgress) onProgress(ci+1, chunks.length);
  }
  return {applied, failed};
}

/* 자동 일정 편성 */
async function doAutoSchedule(extra){
  const t=trip();
  const cands=t.places.filter(p=>p.status==="candidate"||p.status==="scheduled");
  if(!cands.length){ toast("추천 탭에서 가고 싶은 곳을 먼저 찜해 주세요"); go("trip",{tab:"추천"}); return; }
  const sp=tripSpan(t);
  if(!sp){ toast("도시 기간(날짜)을 먼저 설정해 주세요"); return; }
  busyBtn("[data-autoschedule]","AI가 일정 짜는 중...");
  try{
    const dayList=[];
    for(let i=0;i<sp.days;i++){ const d=new Date(sp.s); d.setDate(d.getDate()+i);
      const ds=fmtISO(d);   // 로컬 기준(타임존 밀림 방지)
      const city=t.cities.find(c=>{const s=parseD(c.start),e=parseD(c.end);return s&&e&&d>=s&&d<=e;});
      dayList.push({dayIndex:i+1,date:ds,city:city?city.name:""}); }
    const intLabel={relaxed:"여유(하루 부하 낮게, 장소 2~3곳)",normal:"알차게(하루 3~4곳)",packed:"빡세게(하루 4~5곳, 부하 높게)"}[t.intensity];
    const prompt=`너는 여행 일정 플래너야. 아래 정보로 날짜별 일정 초안을 짜줘.

[여행 강도] ${intLabel} — 장소 '개수'가 아니라 하루 '활동 부하(이동+체류+피로도)' 기준으로 배분. 고강도(활동강도 '고') 장소는 하루에 몰지 마.
[날짜별 도시]
${dayList.map(d=>`Day ${d.dayIndex} (${d.date}) - ${d.city||"도시미정"}`).join("\n")}
[방문할 후보 장소]
${cands.map(p=>`- ${p.name} / 도시:${p.city} / 카테고리:${p.category} / 체류:${p.stayHours||"?"}h / 강도:${p.activity||"중"} / 시점:${p.bestTime||"-"}`).join("\n")}
${t.stays.length?`[숙소] ${t.stays.map(s=>`${s.name}(${s.checkIn}~${s.checkOut})`).join(", ")} — 하루 시작·끝 기준점(앵커)`:""}
${t.transports.length?`[이동·비행기] ${t.transports.map(x=>`${x.date} ${x.fromCity}→${x.toCity} ${x.mode||""} ${x.depart||""}~${x.arrive||""}`).join(", ")} — 이동 소요시간은 비우고 남는 시간에 배치. '🏠 집→도시'는 그 도시 도착(도착시각 이후에만 일정), '도시→🏠 집'은 귀환(출발시각 이전에만 일정, 공항 이동 여유 고려).`:""}
${extra?`[추가 지시] ${extra}`:""}

규칙:
1. 각 장소는 해당 도시의 날짜 구간 안에만 배치. 같은 권역끼리 묶어 동선 최소화.
2. 후보 장소를 최대한 활용하되 부하를 넘기면 다음 날로.
3. 각 항목에 시간(HH:MM) 지정. 'name'은 반드시 위 후보 장소명과 정확히 일치.
4. 이동일에는 이동 항목도 포함(placeMatch 없이).

반드시 아래 JSON만 출력:
{"days":[{"dayIndex":1,"items":[{"time":"09:00","title":"장소명 또는 이동설명","placeMatch":"정확한 후보 장소명 또는 null","note":"메모(선택)"}]}]}`;
    const out=await aiJSON(prompt);
    // 스케줄 구성
    const schedule=dayList.map(d=>({dayIndex:d.dayIndex,date:d.date,city:d.city,intensity:t.intensity,items:[]}));
    cands.forEach(p=>{ if(p.status==="scheduled") p.status="candidate"; }); // 재편성 전 초기화
    (out.days||[]).forEach(od=>{
      const day=schedule.find(s=>s.dayIndex===od.dayIndex); if(!day) return;
      (od.items||[]).forEach(it=>{
        let placeId=null;
        if(it.placeMatch){ const mk=normKey(it.placeMatch);
          const p=t.places.find(x=>x.name===it.placeMatch)
            || t.places.find(x=>{ const k=normKey(x.name); return k && (k===mk || mk.indexOf(k)>=0 || k.indexOf(mk)>=0); });
          if(p){ placeId=p.id; p.status="scheduled"; } }
        day.items.push({id:uid(),time:it.time||"",title:it.title||it.placeMatch||"일정",placeId,note:it.note||""});
      });
    });
    t.schedule=schedule; save(); render(); toast("일정을 짰어요 ⚡");
  }catch(e){ if(e.message!=="nokey") toast(e.message,4000); unbusyBtn("[data-autoschedule]"); }
}

/* ============================================================
   구글 로그인 + 드라이브 동기화 (appDataFolder)
   ============================================================ */
const drive = {
  token:null, tokenClient:null, ready:false, fileId:null,
  init(){
    if(!window.google||!google.accounts||!google.accounts.oauth2) return;
    try{
      this.tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:OAUTH_CLIENT_ID,
        scope:"https://www.googleapis.com/auth/drive.appdata",
        callback:async(resp)=>{
          if(resp.error){ toast("로그인 실패: "+resp.error); return; }
          this.token=resp.access_token;
          toast("구글 연결됨 · 불러오는 중...");
          await this.download(); closeModal(); render();
        }
      });
      this.ready=true;
    }catch(e){}
  },
  signIn(){ if(!this.ready){ toast("구글 로그인 스크립트 로딩 중이거나 이 주소에선 불가해요"); return; } this.tokenClient.requestAccessToken({prompt:"consent"}); },
  signOut(){ if(this.token&&google.accounts.oauth2) google.accounts.oauth2.revoke(this.token,()=>{}); this.token=null; this.fileId=null; toast("로그아웃"); closeModal(); render(); },
  async findFile(){
    if(this.fileId) return this.fileId;   // 조회 결과 캐시(저장마다 검색 왕복 줄임)
    const q=encodeURIComponent(`name='${DRIVE_FILE_NAME}'`);
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id,name)`,
      {headers:{Authorization:"Bearer "+this.token}});
    const j=await r.json(); this.fileId = (j.files&&j.files[0]) ? j.files[0].id : null; return this.fileId;
  },
  async download(){
    try{
      const id=await this.findFile(); if(!id) { await this.upload(); return; }
      const r=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{Authorization:"Bearer "+this.token}});
      const remote=await r.json();
      if(remote&&remote.trips){
        const localT=(state&&state.updatedAt)||0, remoteT=remote.updatedAt||0;
        if(remoteT>=localT){   // 원격이 더 최신(또는 동급) → 채택
          state=remote; localStorage.setItem(STORE_KEY,JSON.stringify(state));
        }else{                 // 로컬이 더 최신 → 로컬 보존하고 원격을 갱신(덮어쓰기로 인한 손실 방지)
          await this.upload();
          toast("이 기기의 최신 변경을 지켰어요");
        }
      }
    }catch(e){ toast("드라이브 불러오기 실패"); }
  },
  async upload(){
    if(!this.token) return;
    const id=await this.findFile();
    const meta={name:DRIVE_FILE_NAME,...(id?{}:{parents:["appDataFolder"]})};
    const boundary="tp"+uid();
    const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`
      +JSON.stringify(meta)+`\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`
      +JSON.stringify(state)+`\r\n--${boundary}--`;
    const url=id?`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart`
      :`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`;
    const r=await fetch(url,{method:id?"PATCH":"POST",
      headers:{Authorization:"Bearer "+this.token,"Content-Type":`multipart/related; boundary=${boundary}`},body});
    if(!id){ try{ const j=await r.json(); if(j&&j.id) this.fileId=j.id; }catch(e){} }   // 새로 만든 파일 ID 캐시
  }
};

/* ============================================================
   모달 / 토스트 공통
   ============================================================ */
function modal(html){
  closeModal();
  const bg=document.createElement("div"); bg.className="modal-bg"; bg.id="modal-bg";
  bg.innerHTML=`<div class="modal" style="position:relative">${html}</div>`;
  bg.addEventListener("click",e=>{ if(e.target===bg||e.target.closest("[data-mclose]")) closeModal(); });
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById("modal-bg"); if(m) m.remove(); }
let toastTimer=null;
function toast(msg,ms=2200){
  const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),ms);
}

   시작
   ============================================================ */
render();

  s.onload=()=>drive.init();
  document.head.appendChild(s);
})();
